<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Väder">
    <title>E-Paper Väder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            -webkit-tap-highlight-color: transparent;
        }
        #weather-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
        }
        #weather-image {
            max-width: 100%;
            max-height: 100%;
            image-rendering: crisp-edges;
            image-rendering: -webkit-optimize-contrast;
            transition: opacity 0.3s ease;
        }
        #weather-image.loading {
            opacity: 0.3;
        }
        #spinner {
            display: none;
            position: absolute;
            width: 60px;
            height: 60px;
            border: 5px solid #333;
            border-top: 5px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        #spinner.visible {
            display: block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="weather-container">
        <img id="weather-image" src="/weather.png?t=0" alt="Väder">
        <div id="spinner"></div>
    </div>
    <script>
        var container = document.getElementById('weather-container');
        var img = document.getElementById('weather-image');
        var spinner = document.getElementById('spinner');
        var isReloading = false;
        var watchdog = null;

        function done() {
            img.classList.remove('loading');
            spinner.classList.remove('visible');
            isReloading = false;
            if (watchdog) { clearTimeout(watchdog); watchdog = null; }
        }

        // Hämta senaste bilden (servern renderar i bakgrunden - detta är billigt)
        function refreshImage() {
            img.src = '/weather.png?t=' + Date.now();
        }

        // Manuell refresh (klick/touch): tvinga servern att rendera om, hämta sedan bilden.
        // Watchdog ser till att isReloading aldrig fastnar om requesten hänger -
        // tidigare kunde en hängd fetch blockera all framtida refresh permanent.
        function reload() {
            if (isReloading) return;
            isReloading = true;
            img.classList.add('loading');
            spinner.classList.add('visible');
            watchdog = setTimeout(done, 45000);

            var controller = new AbortController();
            var timeout = setTimeout(function() { controller.abort(); }, 30000);

            fetch('/api/refresh', { method: 'POST', signal: controller.signal })
            .then(function() { clearTimeout(timeout); refreshImage(); })
            .catch(function() { clearTimeout(timeout); refreshImage(); });
        }

        img.onload = done;
        img.onerror = done;

        // Click för desktop
        container.addEventListener('click', reload);

        // Touch för mobil
        container.addEventListener('touchend', function(e) {
            e.preventDefault();
            reload();
        });

        // Färsk bild direkt vid öppning (initial src är ?t=0 och kan vara cachad)
        refreshImage();

        // Färsk bild när appen kommer tillbaka i förgrunden (iOS home screen-app)
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) refreshImage();
        });

        // Auto-refresh var 60:e sekund (bara bildhämtning - servern renderar själv)
        setInterval(refreshImage, 60000);
    </script>
</body>
</html>
